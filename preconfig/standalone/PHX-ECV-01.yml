# appliance info
applianceInfo:
  softwareVersion:
  hostname: PHX-ECV-01
  group: CLAB
  site: CLAB-PHX
  clusterProfile:
  networkRole: non-hub
  region: lab
  location:
    address: 120 E Van Buren
    address2:
    city: Phoenix
    state: Arizona
    zipCode: 85004
    country: US
    latitude:
    longitude:
  contact:
    name: ContainerLab
    email:
    phoneNumber:
# end of appliance info

# template groups
templateGroups:
  groups:
    - Default Template Group
    - NAC
# end of template groups

# overlays
businessIntentOverlays:
    overlays:
      - RealTime
      - CriticalApps
      - BulkApps
      - DefaultOverlay
# end of overlays

# deployment info
deploymentInfo:
  deploymentMode: inline-router
  totalOutboundBandwidth: 600000
  totalInboundBandwidth: 600000
  passThroughShapedTraffic:
    outboundMaxBandwidth: 10000000

  deploymentInterfaces:
    - interfaceName: lan0
      interfaceLabel: Data
      interfaceType: lan
      interfaceComment: "Test VM LAN"
      ipAddressMask: 10.123.0.1/24
      nextHop:
      segment: Default
      zone: Default
      role: LAN0_DEFAULT
    - interfaceName: wan0
      interfaceLabel: CL_ISP_A
      interfaceType: wan
      interfaceComment: isp-a
      ipAddressMask:
      nextHop:
      inboundMaxBandwidth: 200000
      outboundMaxBandwidth: 200000
      firewallMode: statefulSNAT
      behindNat: none
      segment: Default
      zone: Default
      role: default
    - interfaceName: wan1
      interfaceLabel: CL_ISP_B
      interfaceType: wan
      interfaceComment: isp-b
      ipAddressMask:
      nextHop:
      inboundMaxBandwidth: 200000
      outboundMaxBandwidth: 200000
      firewallMode: statefulSNAT
      behindNat: none
      segment: Default
      zone: Default
      role: default

  dhcpInfo:
    - dhcpInterfaceName: lan0
      dhcpType: server
      dhcpAddressMask: 10.123.0.0/24
      startIpAddress: 10.123.0.100
      endIpAddress: 10.123.0.200
      gatewayIpAddress: 10.123.0.1
      dnsServers:
        - 8.8.8.8
        - 8.8.4.4
      defaultLease: 86400

# end of deployment info

# loopback configuration
loopbackInterface:
  loopbacks:
    - interfaceId: lo0
      adminStatus: Up
      ipAddressMask: 198.19.0.12/32
      interfaceLabel:
      zone: Default
      role: default
      segment: Default
# end of loopback configuration

# segment local routes
segmentLocalRoutes:
  - segment: Default
    routes:
      - routeIpSubnet: 0.0.0.0/0
        nextHop:
        interfaceName:
        metric: 50
        advertise: true
        advertiseToBgp: false
        advertiseToOspf: false
        tag: ANY
        zone:
        comment: Default route
        routeLabel: Internet
# end of segment local routes
