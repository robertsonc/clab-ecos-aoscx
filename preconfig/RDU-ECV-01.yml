# appliance info
applianceInfo:
  softwareVersion:
  hostname: RDU-ECV-01
  group: CLAB
  site: CLAB-RDU
  clusterProfile:
  networkRole: non-hub
  region: lab
  location:
    address: 2400 John Brantley Blvd
    address2:
    city: Raleigh
    state: North Carolina
    zipCode: 27560
    country: US
    latitude:
    longitude:
  contact:
    name: ContainerLab
    email:
    phoneNumber:
# end of appliance info

# template groups
templateGroups:
  groups:
    - Default Template Group
    - NAC
# end of template groups

# overlays
businessIntentOverlays:
    overlays:
      - RealTime
      - CriticalApps
      - BulkApps
      - DefaultOverlay
      - SSE_BYPASS
      - SSE_INSPECT
# end of overlays

# deployment info
deploymentInfo:
  deploymentMode: inline-router
  totalOutboundBandwidth: 600000
  totalInboundBandwidth: 600000
  passThroughShapedTraffic:
    outboundMaxBandwidth: 10000000

  deploymentInterfaces:
    - interfaceName: lan0
      interfaceLabel: Data
      interfaceType: lan
      interfaceComment: "Managed clients"
      ipAddressMask: 192.168.80.1/24
      nextHop:
      segment: Managed
      zone: Default
      role: LAN0_DEFAULT
    - interfaceName: lan1
      interfaceLabel: Data
      interfaceType: lan
      interfaceComment: "Unmanaged clients"
      ipAddressMask: 192.168.81.1/24
      nextHop:
      segment: Unmanaged
      zone: Default
      role: LAN1_DEFAULT
    - interfaceName: lan2
      interfaceType: lan
      interfaceComment: "Guest clients"
      ipAddressMask: 192.168.82.1/24
      nextHop:
      segment: Guest
      zone: Default
      role: LAN2_DEFAULT
    - interfaceName: wan0
      interfaceLabel: CL_ISP_A
      interfaceType: wan
      interfaceComment: isp-a
      ipAddressMask:
      nextHop:
      inboundMaxBandwidth: 200000
      outboundMaxBandwidth: 200000
      firewallMode: statefulSNAT
      behindNat: none
      segment: Default
      zone: Default
      role: default
    - interfaceName: wan1
      interfaceLabel: CL_ISP_B
      interfaceType: wan
      interfaceComment: isp-b
      ipAddressMask:
      nextHop:
      inboundMaxBandwidth: 200000
      outboundMaxBandwidth: 200000
      firewallMode: statefulSNAT
      behindNat: none
      segment: Default
      zone: Default
      role: default

  dhcpInfo:
    - dhcpInterfaceName: lan0
      dhcpType: server
      dhcpAddressMask: 192.168.80.0/24
      startIpAddress: 192.168.80.100
      endIpAddress: 192.168.80.200
      gatewayIpAddress: 192.168.80.1
      dnsServers:
        - 8.8.8.8
        - 8.8.4.4
      defaultLease: 86400
    - dhcpInterfaceName: lan1
      dhcpType: server
      dhcpAddressMask: 192.168.81.0/24
      startIpAddress: 192.168.81.100
      endIpAddress: 192.168.81.200
      gatewayIpAddress: 192.168.81.1
      dnsServers:
        - 8.8.8.8
        - 8.8.4.4
      defaultLease: 86400
    - dhcpInterfaceName: lan2
      dhcpType: server
      dhcpAddressMask: 192.168.82.0/24
      startIpAddress: 192.168.82.100
      endIpAddress: 192.168.82.200
      gatewayIpAddress: 192.168.82.1
      dnsServers:
        - 8.8.8.8
        - 8.8.4.4
      defaultLease: 86400

# end of deployment info

# loopback configuration
loopbackInterface:
  loopbacks:
    - interfaceId: lo0
      adminStatus: Up
      ipAddressMask: 198.19.0.8/32
      interfaceLabel:
      zone: Default
      role: default
      segment: Default
# end of loopback configuration

# segment local routes
segmentLocalRoutes:
  - segment: Managed
    routes:
      - routeIpSubnet: 0.0.0.0/0
        nextHop:
        interfaceName:
        metric: 50
        advertise: true
        advertiseToBgp: false
        advertiseToOspf: false
        tag: ANY
        zone:
        comment: Default for Managed
        routeLabel: Internet
  - segment: Unmanaged
    routes:
      - routeIpSubnet: 0.0.0.0/0
        nextHop:
        interfaceName:
        metric: 50
        advertise: true
        advertiseToBgp: false
        advertiseToOspf: false
        tag: ANY
        zone:
        comment: Default for Unmanaged
        routeLabel: Internet
  - segment: Guest
    routes:
      - routeIpSubnet: 0.0.0.0/0
        nextHop:
        interfaceName:
        metric: 50
        advertise: true
        advertiseToBgp: false
        advertiseToOspf: false
        tag: ANY
        zone:
        comment: Default for Guest
        routeLabel: Internet
# end of segment local routes

